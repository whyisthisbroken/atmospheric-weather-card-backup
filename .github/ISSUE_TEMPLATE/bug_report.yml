name: Bug Report
description: Report an issue or visual bug
body:
  - type: markdown
    attributes:
      value: |
        Please complete the troubleshooting steps below before submitting. This helps filter out conflicts with complex layouts or custom themes.

        > [!WARNING]
        > **Please make it easy for me to help you.** I develop this card in my free time. Please provide your exact YAML and fill out this form directly—do not submit AI-generated reports with long analyses.
  - type: checkboxes
    id: troubleshooting
    attributes:
      label: Prerequisites & Troubleshooting
      description: Please confirm these steps before submitting your issue.
      options:
        - label: I have read the relevant sections of the README and searched for existing issues.
          required: true
        - label: I have tested the card isolated as a single card on a brand new, blank dashboard and the issue persists.
          required: true
        - label: I have temporarily switched to the default Home Assistant theme and the issue persists.
          required: true
  - type: dropdown
    id: theme-type
    attributes:
      label: Home Assistant Theme
      description: What theme are you using when you experience this bug?
      options:
        - Default Theme (Auto)
        - Default Theme (Light)
        - Default Theme (Dark)
        - Custom Theme
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: Clearly describe the issue in your own words. Do NOT paste AI-generated content.
      value: |
        What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: input
    id: card-version
    attributes:
      label: Card Version
      description: What version of the card are you using?
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser / App
      description: Where are you seeing this bug?
      options:
        - Google Chrome
        - Mozilla Firefox
        - Apple Safari
        - Microsoft Edge
        - Home Assistant Companion App (iOS)
        - Home Assistant Companion App (Android)
        - Fully Kiosk Browser
        - Other
    validations:
      required: true
  - type: textarea
    id: yaml-code
    attributes:
      label: ONLY Your Weather Card's YAML
      description: Paste the exact YAML for the Atmospheric Weather Card ONLY. Do NOT paste your entire dashboard, wrapping layout cards, or custom grids here.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Information
      description: Add screenshots (highly recommended!) or browser console error logs.
      value: |
        If you suspect a layout conflict and want to share your full dashboard YAML, drop that here.
    validations:
      required: false
